<section class="project">
  <div class="project__wrapper">
    <div class="project__header">
      <h2>My project-journey</h2>
    </div>

    <div
      class="project__grid"
      #scrollGrid
      (scroll)="onScroll()"
      (scrollend)="onScrollEnd()"
      (wheel)="onWheel($event)"
    >
      @for (project of displayProjects; track $index; let i = $index) {
        <div
          class="project__item"
          [class.project__item--offset]="i % 2 !== 0"
          [class.project__item--active]="currentActiveIndex === i % myProjects.length"
        >
          <span class="project__name">{{ project.name }}</span>
          <img [src]="project.iconUrl" [alt]="project.name" class="project__icon" />
        </div>
      }
    </div>

    <div class="project__controls">
      <button class="project__nav__arrow" (click)="slidePrev()" aria-label="Vorheriges Projekt">
        <svg
          width="78"
          height="70"
          viewBox="0 0 78 70"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10.0545 30.239C30.8272 35.7591 54.3561 30.4597 75.3685 33.4806C75.7546 31.0684 73.502 31.5409 71.8519 31.5327C58.286 28.1973 43.922 28.433 29.8098 28.5405C27.1016 29.0999 6.9506 24.649 10.0529 30.2475"
            fill="currentColor"
          />
          <path
            d="M10.0545 30.239C30.8272 35.7591 54.3561 30.4597 75.3685 33.4806C75.7546 31.0684 73.502 31.5409 71.8519 31.5327C58.286 28.1973 43.922 28.433 29.8098 28.5405C27.1016 29.0999 6.95061 24.649 10.0529 30.2475"
            stroke="currentColor"
            stroke-width="3"
          />
          <path
            d="M34.65 47.3813C26.8555 42.6464 18.0594 38.7455 10.6451 30.4546C6.87723 20.9817 21.0517 35.6225 24.9434 37.7762C27.6069 40.3266 37.9053 44.0815 34.639 47.3665"
            fill="currentColor"
          />
          <path
            d="M34.65 47.3813C26.8555 42.6464 18.0594 38.7455 10.6451 30.4546C6.87723 20.9817 21.0517 35.6225 24.9434 37.7762C27.6069 40.3266 37.9053 44.0815 34.639 47.3665"
            stroke="currentColor"
            stroke-width="3"
          />
          <path
            d="M43.9807 20.6569C35.6272 21.8181 30.5141 24.3844 23.7279 26.5565C21.4683 27.6097 18.3976 30.0804 15.0919 30.1097C11.4243 30.1392 8.0893 28.434 10.9966 27.151C13.2665 28.1443 47.3885 13.0609 43.9801 20.6658"
            fill="currentColor"
          />
          <path
            d="M43.9807 20.6569C35.6272 21.8181 30.5141 24.3844 23.7279 26.5565C21.4683 27.6097 18.3976 30.0804 15.0919 30.1097C11.4243 30.1392 8.0893 28.434 10.9966 27.151C13.2665 28.1443 47.3885 13.0609 43.9801 20.6658"
            stroke="currentColor"
            stroke-width="3"
          />
        </svg>
      </button>

      <div class="project__nav">
        @for (project of myProjects; track project.name; let i = $index) {
          <button
            class="project__nav-dot"
            [class.project__nav-dot--active]="currentActiveIndex === i"
            (click)="scrollToProject(i)"
            [attr.aria-label]="'Zum Projekt ' + project.name + ' springen'"
          ></button>
        }
      </div>

      <button
        class="project__nav__arrow project__nav__arrow--right"
        (click)="slideNext()"
        aria-label="Nächstes Projekt"
      >
        <svg
          width="78"
          height="70"
          viewBox="0 0 78 70"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10.0545 30.239C30.8272 35.7591 54.3561 30.4597 75.3685 33.4806C75.7546 31.0684 73.502 31.5409 71.8519 31.5327C58.286 28.1973 43.922 28.433 29.8098 28.5405C27.1016 29.0999 6.9506 24.649 10.0529 30.2475"
            fill="currentColor"
          />

            stroke="currentColor"
            stroke-width="3"
          />

            d="M34.65 47.3813C26.8555 42.6464 18.0594 38.7455 10.6451 30.4546C6.87723 20.9817 21.0517 35.6225 24.9434 37.7762C27.6069 40.3266 37.9053 44.0815 34.639 47.3665"

          />

            fill="currentColor"
          />
          <path
            d="M43.9807 20.6569C35.6272 21.8181 30.5141 24.3844 23.7279 26.5565C21.4683 27.6097 18.3976 30.0804 15.0919 30.1097C11.4243 30.1392 8.0893 28.434 10.9966 27.151C13.2665 28.1443 47.3885 13.0609 43.9801 20.6658"
            stroke="currentColor"
            stroke-width="3"
          />
        </svg>
      </button>
    </div>
  </div>
</section>
