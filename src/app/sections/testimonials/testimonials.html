      <h2>Voices Along the Way</h2>
      <h3 class="testemonials__header__subtext">
        Großartige Software entsteht nur im Team. Ein ehrlicher Einblick aus den letzten Monaten,
        wie Kollegen und Mentoren die Zusammenarbeit erlebt haben.
      </h3>
    </div>
